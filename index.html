<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="script.js" defer></script>
    <title>Control panel</title>
</head>

<body>
    <input type="checkbox" id="geheime-knop" accesskey="e">

    <ul id="achtergrond-tekst">
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
        <li class="rij"></li>
    </ul>

    <main>
        <nav data-naam="control-kaart">
            <section data-naam="control-canvas">
                <form data-naam="controls-grid">
                    <label>
                        <input type="checkbox" value="kroon"> 👑
                    </label>
                    <label>
                        <input type="checkbox" value="wind"> 🌬️
                    </label>
                    <label>
                        <input type="checkbox" value="icoon"> 💔
                    </label>
                    <label>
                        <input type="checkbox" value="koning"> ♣️
                    </label>
                    <label>
                        <input type="checkbox" value="beweeg"> ↔️
                    </label>
                    <label>
                        <input type="checkbox" value="autos"> 🚙
                    </label>
                </form>

                <label>Gezicht<input type="range" value="0" min="0" max="100" step="50" list="gezicht"
                        name="gezicht"></label>
                <datalist id="gezicht">
                    <option value="0">0</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </datalist>

                <label>Nacht<input type="range" value="0" min="0" max="100" list="nacht" name="nacht"></label>
                <datalist id="nacht">
                    <option value="0">Dag</option>
                    <option value="100">Nacht</option>
                </datalist>

                <label data-naam="geheime-slider-label">Misselijk<input type="range" value="0" min="0" max="100"
                        step="10" list="misselijkmakend" name="misselijkmakend"></label>
                <datalist id="misselijkmakend">
                    <option value="0">0</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </datalist>
            </section>
        </nav>

        <article data-naam="kaart">
            <section data-naam="canvas">

                <section data-naam="helft-boven">
                    <figure data-naam="tekening-schaal">

                        <aside data-naam="wrapper-hart">
                            <b data-naam="icoon-groot"></b>
                        </aside>

                        <article data-naam="karakter">
                            <header data-naam="kroon">
                                <span data-naam="misselijk">🤢</span>
                                <span data-naam="misselijk2">🤮</span>
                            </header>
                            <header data-naam="kroon-koning">
                                <span data-naam="misselijk">🤢</span>
                                <span data-naam="misselijk2">🤮</span>
                            </header>

                            <aside data-naam="haar-links"></aside>
                            <aside data-naam="haar-koning"></aside>

                            <ul data-naam="hoofd">
                                <li data-naam="oog"></li>
                                <li data-naam="wimper1"></li>
                                <li data-naam="wimper2"></li>
                                <li data-naam="wimper3"></li>
                                <li data-naam="wimper4"></li>
                                <li data-naam="wenkbrauw1"></li>
                                <li data-naam="baard"></li>
                                <input type="checkbox" data-naam="mond">
                            </ul>

                            <s data-naam="nek"></s>

                            <section data-naam="wrapper-jurk">
                                <figure data-naam="jurk"></figure>
                                <figure data-naam="mantel"></figure>
                            </section>

                            <footer data-naam="bovenarm-links">
                                <b data-naam="onderarm-links"></b>
                            </footer>

                            <footer data-naam="bovenarm-links-koning">
                                <b data-naam="onderarm-links-koning"></b>
                            </footer>

                            <footer data-naam="bovenarm-rechts">
                                <b data-naam="onderarm-rechts">
                                    <i data-naam="bloem">
                                        <figure data-naam="bloemsteel">
                                            <ul data-naam="bloem-bovenkant">
                                                <ol data-naam="bloemblaadjes-groep">
                                                    <li data-naam="bloemblaadje1"></li>
                                                    <li data-naam="bloemblaadje2"></li>
                                                    <li data-naam="bloemblaadje3"></li>
                                                    <li data-naam="bloemblaadje4"></li>
                                                    <li data-naam="bloemblaadje5"></li>
                                                    <li data-naam="bloemblaadje6"></li>
                                                </ol>
                                                <em data-naam="bloemhart"></em>
                                            </ul>
                                        </figure>
                                    </i>
                                </b>
                            </footer>

                            <footer data-naam="bovenarm-rechts-koning">
                                <b data-naam="onderarm-rechts-koning">
                                    <i data-naam="zwaard">
                                        <s data-naam="zwaard-kling"></s>
                                        <u data-naam="zwaard-stootplaat"></u>
                                        <q data-naam="zwaard-handvat"></q>
                                    </i>
                                </b>
                            </footer>
                        </article>
                    </figure>
                </section>

                <aside data-naam="middellijn">
                    <s data-naam="stippellijn"></s>
                    <input type="checkbox" data-naam="streepje">
                    <mark data-naam="auto-boven">🚗</mark>
                    <mark data-naam="auto-onder">🚙</mark>
                </aside>

                <section data-naam="helft-onder">
                    <figure data-naam="tekening-schaal">

                        <aside data-naam="wrapper-hart">
                            <b data-naam="icoon-groot"></b>
                        </aside>

                        <article data-naam="karakter">
                            <header data-naam="kroon">
                                <span data-naam="misselijk">🤢</span>
                                <span data-naam="misselijk2">🤮</span>
                            </header>
                            <header data-naam="kroon-koning">
                                <span data-naam="misselijk">🤢</span>
                                <span data-naam="misselijk2">🤮</span>
                            </header>

                            <aside data-naam="haar-links"></aside>
                            <aside data-naam="haar-koning"></aside>

                            <ul data-naam="hoofd">
                                <li data-naam="oog"></li>
                                <li data-naam="wimper1"></li>
                                <li data-naam="wimper2"></li>
                                <li data-naam="wimper3"></li>
                                <li data-naam="wimper4"></li>
                                <li data-naam="wenkbrauw1"></li>
                                <li data-naam="baard"></li>
                                <input type="checkbox" data-naam="mond">
                            </ul>

                            <s data-naam="nek"></s>

                            <section data-naam="wrapper-jurk">
                                <figure data-naam="jurk"></figure>
                                <figure data-naam="mantel"></figure>
                            </section>

                            <footer data-naam="bovenarm-links">
                                <b data-naam="onderarm-links"></b>
                            </footer>

                            <footer data-naam="bovenarm-links-koning">
                                <b data-naam="onderarm-links-koning"></b>
                            </footer>

                            <footer data-naam="bovenarm-rechts">
                                <b data-naam="onderarm-rechts">
                                    <i data-naam="bloem">
                                        <figure data-naam="bloemsteel">
                                            <ul data-naam="bloem-bovenkant">
                                                <ol data-naam="bloemblaadjes-groep">
                                                    <li data-naam="bloemblaadje1"></li>
                                                    <li data-naam="bloemblaadje2"></li>
                                                    <li data-naam="bloemblaadje3"></li>
                                                    <li data-naam="bloemblaadje4"></li>
                                                    <li data-naam="bloemblaadje5"></li>
                                                    <li data-naam="bloemblaadje6"></li>
                                                </ol>
                                                <em data-naam="bloemhart"></em>
                                            </ul>
                                        </figure>
                                    </i>
                                </b>
                            </footer>

                            <footer data-naam="bovenarm-rechts-koning">
                                <b data-naam="onderarm-rechts-koning">
                                    <i data-naam="zwaard">
                                        <s data-naam="zwaard-kling"></s>
                                        <u data-naam="zwaard-stootplaat"></u>
                                        <q data-naam="zwaard-handvat"></q>
                                    </i>
                                </b>
                            </footer>
                        </article>
                    </figure>
                </section>

            </section>
        </article>
    </main>
</body>

</html>
